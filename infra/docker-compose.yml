services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: study-archive-app
    environment:
      # `.env`에 `NODE_ENV=development`가 남아 있으면(`.env.example` 복사 실수),
      # HTTPS(Nginx) 뒤에서도 Secure 쿠키가 꺼져 로그인 직후 세션이 저장되지 않을 수 있습니다.
      NODE_ENV: production
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - app_uploads:/app/public/uploads
    networks:
      - study_net

  postgres:
    image: postgres:16-alpine
    container_name: study-archive-db
    environment:
      POSTGRES_DB: study_archive
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: change_me
    ports:
      # Host에서 `npm run dev`로 접속할 때 DB에 붙으려면 호스트 포트가 필요합니다.
      # 외부에 노출하지 않으려면 127.0.0.1에만 바인딩하세요.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_user -d study_archive"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - study_net

  nginx:
    image: nginx:1.27-alpine
    container_name: study-archive-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    restart: unless-stopped
    networks:
      - study_net

volumes:
  postgres_data:
  app_uploads:
  nginx_logs:

networks:
  study_net:
    driver: bridge
